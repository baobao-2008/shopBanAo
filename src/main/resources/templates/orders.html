<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h3 class="mb-4">Đơn hàng của tôi</h3>

  <div th:if="${orders == null or orders.isEmty()}" class="text-center py-5">
    <i class="bi bi-bag-x" style="font-size: 4rem; color: #ccc"></i>
    <p class="mt-3 text-muted">Bạn chưa có đơn hàng nào</p>
    <a href="/home/index" class="btn btn-dark mt-2">Mua sắm ngay</a>
  </div>

  <table th:if="${orders != null and !orders.isEmpty()}" class="table table-hover">
    <thead class="table-dark">
    <tr>
      <th>Mã đơn</th>
      <th>Ngày đặt</th>
      <th>Địa chỉ</th>
      <th>Số sản phẩm</th>
      <th>Chi tiết</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orders}">
      <td th:text="${o.id}"></td>
      <td th:text="${o.createDate}"></td>
      <td th:text="${o.address}"></td>
      <td th:text="${o.orderDetails.size()}"></td>
      <td>
        <a th:href="@{|/orders/${o.id}|}" class="btn btn-outline-dark btn-sm">
          Xem chi tiết
        </a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
