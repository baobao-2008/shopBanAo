<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 800px">
    <h3 class="mb-4">Xác nhận đơn hàng</h3>

    <table class="table table-hover mb-4">
        <thead class="table-dark">
        <tr>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item:${cart}">
            <td th:text="${item.productName}"></td>
            <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
            <td th:text="${item.quantity}"></td>
           <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.totalPrice,0,2)} + '₫'" >
           </td>
        </tr>
        </tbody>
    </table>

    <h5 class="text-end">
       Tổng tiền:
        <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
    </h5>

    <form action="/checkout" method="post" class="mt-4">
        <div class="mb-3">
            <label class="fw-bold">Tên người nhận</label>
            <input type="text" name="receiverName" class="form-control" placeholder="Nhập tên người nhận..." required>
        </div>

        <div class="mb-3">
            <label class="fw-bold">Số điện thoại</label>
            <input type="text" name="phone" class="form-control"
                   placeholder="Nhập số điện thoại..." required>
        </div>

        <div class="mb-3">
            <label class="fw-bold">Địa chỉ giao hàng</label>
            <input type="text" name="address" class="form-control"
                   placeholder="Nhập địa chỉ nhận hàng..." required>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <a href="/cart" class="btn btn-outline-secondary">Quay lại giỏ hàng</a>

            <button type="submit" class="btn btn-dark"> Xác nhận đơn hàng</button>
        </div>
    </form>
</div>
</body>
</html>
