<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Login</title>
</head>
<body>
<form th:action="@{/auth/login-process}" method="post" class="container mt-5" style="max-width: 400px;">
    <h2 class="text-center">Đăng nhập</h2>

    <div class="mb-3">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Mật khẩu</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div th:if="${param.error}" class="text-danger mb-3">
                         Sai tên đăng nhập hoặc mật khẩu
    </div>
    <button type="submit" class="btn btn-dark w-100">Đăng nhập</button>

    <div class="text-center">
        <a th:href="@{/auth/register}" class="text-decoration-none fw-bold text-dark">Đăng ký ngay</a>
        <a href="/auth/forgot-password" class="text-decoration-none fw-bold text-dark">Quên mật khẩu?</a>
    </div>

    <div th:if="${message}" class="alert alert-info text-center" th:text="${message}">
    </div>

</form>
</body>
</html>
