<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sửa tài khoản</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section th:fragment="content">
  <h3 class="mb-4 text-center">Sửa tài khoản</h3>

  <div class="card border-0 shadow-sm p-4 mx-auto" style="max-width: 700px">
    <form action="/admin/accounts/update" method="post">

      <input type="hidden" name="username" th:value="${account.username}">

      <div class="mb-3">
        <label>Tên đăng nhập (Username)</label>
        <input type="text" class="form-control"
               th:value="${account.username}" disabled>
      </div>

      <div class="mb-3">
        <label>Mật khẩu mới</label>
        <input type="password" name="password" class="form-control"
               th:value="${account.password}">
      </div>

      <div class="mb-3">
        <label>Họ và tên</label>
        <input type="text" name="fullname" class="form-control"
               th:value="${account.fullname}" required>
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control"
               th:value="${account.email}" required>
      </div>


      <div class="d-flex gap-2 justify-content-center">
        <button type="submit" class="btn btn-dark">Cập nhật</button>
        <a href="/admin/accounts" class="btn btn-secondary">Hủy</a>
      </div>
    </form>
  </div>
</section>
</body>
</html>
