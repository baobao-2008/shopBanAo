<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thống kê doanh thu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section th:fragment="content">

    <h3 class="mb-4">Thống kê doanh thu theo loại hàng</h3>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="py-3 ps-4">Loại hàng</th>
                    <th class="py-3 ps-4">Tổng doanh thu</th>
                    <th class="py-3 ps-4">Tổng số lượng</th>
                    <th class="py-3 ps-4">Giá cao nhất</th>
                    <th class="py-3 ps-4">Giá thấp nhất</th>
                    <th class="py-3 ps-4">Giá trung bình</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${revenues}">
                    <td class="ps-4 fw-bold" th:text="${r.categoryName}"></td>
                    <td class="ps-4 text-success fw-bold"
                        th:text="${#numbers.formatDecimal(r.totalRevenue, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                    <td class="ps-4" th:text="${r.totalQuantity}"></td>
                    <td class="ps-4 text-danger"
                        th:text="${#numbers.formatDecimal(r.maxPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                    <td class="ps-4 text-primary"
                        th:text="${#numbers.formatDecimal(r.minPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                    <td class="ps-4"
                        th:text="${#numbers.formatDecimal(r.avgPrice, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
                </tr>
                <tfoot class="table-secondary fw-bold">
                <tr>
                    <td class="ps-4">Tổng cộng</td>
                    <td class="ps-4 text-success"
                        th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + '₫'">
                    </td>
                    <td class="ps-4" th:text="${totalQuantity}"></td>
                    <td colspan="3"></td>
                </tr>
                </tfoot>

            </table>
        </div>
    </div>
    </section>
</body>
</html>
