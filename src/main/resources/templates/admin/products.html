<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Quản lý sản phẩm</title>
</head>
<body>
<section th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Danh sách sản phẩm</h3>
    <a th:href="@{/admin/products/add}" class="btn btn-dark btn-sm px-3">
        <i class="bi bi-plus-circle me-2"></i>Thêm sản phẩm
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th class="py-3 ps-4">Id</th>
                <th class="py-3 ps-4">Name</th>
                <th class="py-3 ps-4">Image</th>
                <th class="py-3 ps-4">Price</th>
                <th class="py-3 ps-4">Create date</th>
                <th class="py-3 ps-4">Available</th>
                <th class="py-3 ps-4">Quantity</th>
                <th class="py-3 ps-4">Thao tác</th>
            </tr>
            </thead>

            <tbody class="text-center">
            <tr th:each="p: ${products}">
                <td class="ps-4 fw-bold" th:text="${p.getId}"></td>
                <td class="ps-4 fw-bold" th:text="${p.getName}"></td>
                <td class="ps-4">
                    <img th:src="@{|/images/ao_phong/${p.getImage}|}" alt="image" style="width: 100px; height: 80px;object-fit: cover" class="rounded shadow-sm">
                </td>
                <td class="ps-4 fw-bold" th:text="${p.getPrice}"></td>
                <td class="ps-4 fw-bold" th:text="${p.getCreateDate()}"></td>
                <td class="ps-4 fw-bold" th:text="${p.available} ? 'Còn hàng' : 'Hết hàng'"></td>
                <td class="ps-4 fw-bold" th:text="${p.getQuantity}"></td>
                <td class="text-center">
                    <a th:href="@{|/admin/products/edit/${p.id}|}" class="btn btn-outline-primary btn-sm border-0">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{|/admin/products/delete/${p.id}|}" class="btn btn-outline-danger btn-sm border-0 ms-2" >
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</section>

</body>
</html>
