<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>

<style>
  .list-group-item {
    padding-top: 20px !important;
    padding-bottom: 20px !important;
    padding-left: 25px !important;
    font-size: 1.05rem;
    transition: all 0.3s ease;
  }
  .list-group-item-action:hover {
    background-color: #343a40 !important;
    color: #0dcaf0 !important;
    transition: all 0.3s ease;
    padding-left: 1.5rem !important;
  }
  .list-group-item i {
    margin-right: 10px;
  }
</style>

<div class="d-flex" style="min-height: 100vh;">
  <div class="bg-dark text-white" style="width: 250px;">
    <div class="p-3 fw-bold border-bottom">ATINO ADMIN</div>

    <div class="list-group list-group-flush">
      <a th:href="@{/admin/orders}" class="list-group-item list-group-item-action bg-dark text-white border-0">
        Quản lý hóa đơn
      </a>
      <a th:href="@{/admin/products}" class="list-group-item list-group-item-action bg-dark text-white border-0">
        Quản lý sản phẩm
      </a>
      <a th:href="@{/admin/accounts}" class="list-group-item list-group-item-action bg-dark text-white border-0">
        Quản lý tài khoản
      </a>
      <a th:href="@{/admin/statistics/revenue}"
         class="list-group-item list-group-item-action bg-dark text-white border-0">
        <i class="bi bi-bar-chart me-2"></i>Doanh thu theo loại
      </a>
      <a th:href="@{/admin/statistics/vip}"
         class="list-group-item list-group-item-action bg-dark text-white border-0">
        <i class="bi bi-star me-2"></i>Khách hàng VIP
      </a>
      <a th:href="@{/auth/logout}" class="list-group-item list-group-item-action bg-dark text-danger border-0 py-3 mt-5">
        <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
      </a>
    </div>
  </div>

  <div class="flex-fill bg-light">
    <div class="bg-white p-3 border-bottom shadow-sm fw-bold fw-5">
      Hệ thống quản trị
    </div>
    <div class="p-4">
      <div th:insert="~{__${page}__ :: content}"></div>
    </div>
</div>
</div>
</body>
</html>
