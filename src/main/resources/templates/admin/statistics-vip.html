<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top 10 khách hàng vip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<section th:fragment="content">
  <h3 class="mb-4">Top 10 khách hàng VIP</h3>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
        <tr>
          <th class="py-3 ps-4">Hạng</th>
          <th class="py-3 ps-4">Tên khách hàng</th>
          <th class="py-3 ps-4">Tổng tiền đã mua</th>
          <th class="py-3 ps-4">Ngày mua đầu tiên</th>
          <th class="py-3 ps-4">Ngày mua sau cùng</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v, stat : ${vips}">
          <td class="ps-4 fw-bold">
            <span th:if="${stat.index == 0}">🥇</span>
            <span th:if="${stat.index == 1}">🥈</span>
            <span th:if="${stat.index == 2}">🥉</span>
            <span th:if="${stat.index >= 3}" th:text="${stat.index + 1}"></span>
          </td>
          <td class="ps-4 fw-bold" th:text="${v.fullname}"></td>
          <td class="ps-4 text-success fw-bold"
              th:text="${#numbers.formatDecimal(v.totalSpent, 0, 'COMMA', 0, 'POINT')} + '₫'"></td>
          <td class="ps-4" th:text="${v.firstOrderDate}"></td>
          <td class="ps-4" th:text="${v.lastOrderDate}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
</body>
</html>
