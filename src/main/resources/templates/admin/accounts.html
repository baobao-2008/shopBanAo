<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Danh sách tài khoản</h3>
        <button class="btn btn-dark btn-sm px-3">
            <i class="bi bi-person-plus-fill me-2"></i>Thêm tài khoản
        </button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="py-3 ps-4">UserName</th>
                    <th class="py-3 ps-4">Họ và tên</th>
                    <th class="py-3 ps-4">Email</th>
                    <th class="py-3 ps-4">Vai trò</th>
                    <th class="py-3 ps-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="acc: ${accounts}">
                    <td class="ps-4 fw-bold" th:text="${acc.username}"></td>
                    <td class="ps-4 fw-bold" th:text="${acc.fullname}"></td>
                    <td class="ps-4 fw-bold" th:text="${acc.email}"></td>
                    <td class="ps-4 fw-bold" th:text="${acc.admin}"></td>
                    <td class="text-center">
                        <a href="#" class="btn btn-outline-primary btn-sm border-0"><i class="bi bi-pencil-square"></i></a>

                        <a th:href="@{|/admin/accounts/delete/${acc.id}|}" class="btn btn-outline-danger btn-sm border-0 ms-2"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
