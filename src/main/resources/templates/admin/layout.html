<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<style>
    .list-group-item {
        padding: 15px 20px !important;
        transition: all 0.3s;
    }
    .list-group-item:hover {
        background-color: #343a40 !important;
        padding-left: 30px !important;
    }
</style>

<body>
<div class="d-flex" style="min-height: 100vh;">
    <div class="bg-dark text-white" style="width: 250px;">
        <div class="p-3 fw-bold border-bottom">ATINO ADMIN</div>

        <div class="list-group list-group-flush">
            <a th:href="@{/admin/orders}" class="list-group-item list-group-item-action bg-dark text-white border-0">
                Quản lý hóa đơn
            </a>
            <a th:href="@{/admin/products}" class="list-group-item list-group-item-action bg-dark text-white border-0">
                Quản lý sản phẩm
            </a>
            <a th:href="@{/admin/accounts}" class="list-group-item list-group-item-action bg-dark text-white border-0">
                Quản lý tài khoản
            </a>
            <a th:href="@{/auth/logout}" class="list-group-item list-group-item-action bg-dark text-danger border-0">
                <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
            </a>
        </div>
    </div>

    <div class="flex-fill bg-light">
        <div class="bg-white p-3 border-bottom shadow-sm">
            Hệ thống quản trị
        </div>
        <div class="p-4">
            <div layout:fragment="content"></div>
        </div>
    </div>
</div>
</body>
</html>
