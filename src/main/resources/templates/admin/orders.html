<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/sidebar}">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Quản lý hóa đơn</title>
</head>
<body>
<section layout:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Danh sách hóa đơn</h3>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th class="py-3 ps-4">UserName</th>
                <th class="py-3 ps-4">Password</th>
                <th class="py-3 ps-4">Họ và tên</th>
                <th class="py-3 ps-4">Email</th>
                <th class="py-3 ps-4">Vai trò</th>
                <th class="py-3 ps-4">Thao tác</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="acc: ${accounts}">
                <td class="ps-4 fw-bold" th:text="${acc.getUsername()}"></td>
                <td class="ps-4 fw-bold" th:text="${acc.getPassword()}"></td>
                <td class="ps-4 fw-bold" th:text="${acc.getFullname()}"></td>
                <td class="ps-4 fw-bold" th:text="${acc.getEmail()}"></td>
                <td class="ps-4 fw-bold" th:text="${acc.getAdmin()}"></td>
                <td class="text-center">
                    <a href="#" class="btn btn-outline-primary btn-sm border-0">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a href="#" class="btn btn-outline-danger btn-sm border-0 ms-2">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</section>

</body>
</html>
