<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Quản lý hóa đơn</title>
</head>
<body>
<section th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Danh sách hóa đơn</h3>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th class="py-3 ps-4">ID</th>
                <th class="py-3 ps-4">Username</th>
                <th class="py-3 ps-4">Create date</th>
                <th class="py-3 ps-4">Address</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="o: ${orders}">
                <td class="ps-4 fw-bold" th:text="${o.getId}"></td>
                <td class="ps-4 fw-bold" th:text="${o.getUserName}"></td>
                <td class="ps-4 fw-bold" th:text="${o.getCreateDate}"></td>
                <td class="ps-4 fw-bold" th:text="${o.getAdress}"></td>
                <td class="text-center">
                    <a href="#" class="btn btn-outline-primary btn-sm border-0">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a href="#" class="btn btn-outline-danger btn-sm border-0 ms-2">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</section>

</body>
</html>
