<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Quên mật khẩu</title>
</head>
<body>
<div class="container mt-5" style="max-width: 450px">
    <h3 class="mb-4">Quên mật khẩu</h3>

    <div th:text="${messages}" class="alert alert-success" th:text="${message}"></div>
    <div th:text="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form action="/auth/forgot-password" method="post">
        <div class="mb-3">
            <label>Email đã đăng ký</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">
            Gửi link đặt mật khẩu
        </button>
        <div class="mt-3 text-center">
            <a href="/auth/login">Quay lại đăng nhập</a>
        </div>
    </form>
</div>
</body>
</html>
