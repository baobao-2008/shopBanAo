<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h3 class="mb-2">Chi tiết đơn hàng #<span th:text="${order.id}"></span></h3>
  <p class="text-muted">Ngày đặt: <span th:text="${order.createDate}"></span></p>
  <p class="text-muted">Địa chỉ: <span th:text="${order.address}"></span></p>

  <table class="table table-hover mt-4">
    <thead class="table-dark">
    <tr>
      <th>Sản phẩm</th>
      <th>Ảnh</th>
      <th>Đơn giá</th>
      <th>Số lượng</th>
      <th>Thành tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="detail : ${order.orderDetails}">
      <td class="align-middle" th:text="${detail.product.name}"></td>
      <td class="align-middle">
        <img th:src="@{|/images/ao_phong/${detail.product.image}|}"
             style="width: 70px; height: 60px; object-fit: cover" class="rounded">
      </td>
      <td class="align-middle"
          th:text="${#numbers.formatDecimal(detail.price, 0,2)} + '₫'"></td>
      <td class="align-middle" th:text="${detail.quantity}"></td>
      <td class="align-middle text-danger fw-bold"
          th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0,2)} + '₫'"></td>
    </tr>
    </tbody>
  </table>

  <div class="text-end mt-3">
    <a href="/orders" class="btn btn-outline-dark">Quay lại danh sách</a>
  </div>
</div>
</body>
</html>
