<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
</head>
<body>
<div class="container mt-5">
   <h3 class="mb-4">
       Giỏ hàng của bản
   </h3>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div th:if="${cart == null or cart.isEmpty()}" class="text-center py-5">
        <i class="bi bi-cart-x" style="font-size: 4rem; color: #ccc"></i>
        <p class="mt-3 text-muted">Giỏ hàng của bạn đang rỗng</p>
        <a th:href="@{home/index}" class="btn btn-dark mt-2"> Tiếp tục mua sắm</a>
    </div>

    <div th:if="${cart != null and !cart.isEmpty()}">
        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th> Sản phẩm</th>
                <th>Ảnh</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Xóa</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart}">
                <td class="align-middle fw-bold" th:text="${item.productName}"></td>
                <td class="align-middle fw-bold" >
                    <img th:src="@{|/images/ao_phong/${item.productImage}|}"
                         style="width: 70px; height: 60px; object-fit: cover" class="rounded">
                </td>
                <td class="align-middle fw-bold" th:text="${#numbers.formatDecimal(item.price,0,2)}+ '₫'" > </td>

                <td class="align-middle" style="width: 150px">
                    <form th:action="|/cart/update/${item.productId}|" method="post" class="d-flex align-items-center gap-2">

                        <input type="number" name="quantity" class="form-control form-control-sm" th:value="${item.quantity}" min="1" style="width: 70px">
<button type="submit" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-clockwise"></i>
</button>
                    </form>
                </td>

                <td class="text-danger align-middle fw-bold"
                th:text="${#numbers.formatDecimal(item.getTotalPrice(),0,2)} + '₫'"></td>

                <td class="align-middle">
                    <a th:href="@{|/cart/remove/${item.productId}|}"
                    class="btn btn-outline-danger btn-sm"
                    onclick="return confirm('Xóa sản phẩm trong giỏ hàng này')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <a th:href="@{/cart/clear}" class="btn btn-outline-secondary"
            onclick="return confirm('Xóa toàn bộ sản phẩm')">
                <i class="bi bi-trash me-1"></i>Xóa tất cả
            </a>

            <div class="text-end">
                <h5>Tổng tiền <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(total,0,2)} + '₫'"></span></h5>

                <a th:href="@{/home/index}" class="btn btn-outline-dark me-2">Tiếp tục mua</a>
                <a th:href="@{/checkout}" class="btn btn-dark">Đặt hàng</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
