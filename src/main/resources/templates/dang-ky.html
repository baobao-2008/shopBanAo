<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title> Đăng ký</title>
</head>
<body>
<form action="/auth/register" method="post" enctype="multipart/form-data">
  Name: <input type="text" name="name" class="form-control" required>

  Password: <input type="text" name="password" class="form-control" required>

  Email: <input type="text" name="email" class="form-control" required>

  Fullname: <input type="text" name="fullname" class="form-control" required>

  Image <input type="file" name="photo" class="form-control">

  <button type="submit" class="btn btn-dark">Đăng ký</button>
</form>
</body>
</html>
